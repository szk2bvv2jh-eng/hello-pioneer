<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pioneer Notes</title>
    <style>
      body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 1.5rem; }
      input, textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 1rem; }
      textarea { height: 100px; resize: vertical; }
      button { padding: 0.5rem 1.25rem; font-size: 1rem; cursor: pointer; }
      #notes { margin-top: 2rem; }
      .note { border: 1px solid #ddd; border-radius: 4px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; }
      .note-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
      .note h3 { margin: 0 0 0.25rem; }
      .note p { margin: 0; color: #555; }
      .share-btn { flex-shrink: 0; padding: 0.25rem 0.75rem; font-size: 0.8rem; cursor: pointer; background: #fff; border: 1px solid #bbb; border-radius: 4px; color: #333; }
      .share-btn:hover { background: #f0f0f0; }
      .share-btn:disabled { opacity: 0.5; cursor: default; }
      .activity { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.35rem; min-height: 0; }
      .ev { font-size: 0.72rem; padding: 0.15rem 0.55rem; border-radius: 12px; background: #f0f0f0; color: #555; }
      .ev-delivered { background: #e8f5e9; color: #2e7d32; }
      .ev-opened    { background: #e3f2fd; color: #1565c0; }
      .ev-clicked   { background: #ede7f6; color: #4527a0; }
      .ev-bounced   { background: #fce4ec; color: #c62828; }
      .ev-complained{ background: #fff3e0; color: #e65100; }
      #status { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }
      #error { color: red; font-size: 0.85rem; margin-top: 1rem; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>hello from Pioneer Species</h1>

    <form id="note-form">
      <input id="title" type="text" placeholder="Title" required />
      <textarea id="content" placeholder="Write a note…"></textarea>
      <button type="submit">Post note</button>
      <p id="status"></p>
    </form>

    <div id="error"></div>
    <div id="notes"></div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      function showError(msg) {
        document.getElementById('error').textContent = 'Error: ' + msg;
      }

      function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      let client;

      async function init() {
        try {
          const res = await fetch('/api/config');
          const { supabaseUrl, supabaseKey } = await res.json();
          client = createClient(supabaseUrl, supabaseKey);
          await loadNotes();
        } catch (err) {
          showError(err.message);
        }
      }

      async function loadNotes() {
        const container = document.getElementById('notes');
        const { data, error } = await client
          .from('notes')
          .select('id, title, content, created_at')
          .order('created_at', { ascending: false });

        if (error) { showError(error.message); return; }
        if (!data.length) { container.textContent = 'No notes yet.'; return; }

        container.innerHTML = data.map(n => `
          <div class="note">
            <div class="note-header">
              <h3>${escHtml(n.title)}</h3>
              <button class="share-btn" data-id="${escHtml(String(n.id))}" data-title="${escHtml(n.title)}" data-content="${escHtml(n.content || '')}">Share via email</button>
            </div>
            <p>${escHtml(n.content || '')}</p>
            <div class="activity" id="activity-${escHtml(String(n.id))}"></div>
          </div>
        `).join('');

        container.querySelectorAll('.share-btn').forEach(btn => {
          btn.addEventListener('click', () => shareNote(btn));
        });

        await loadActivity(data.map(n => n.id));
      }

      async function loadActivity(noteIds) {
        if (!noteIds.length) return;
        const { data, error } = await client
          .from('email_events')
          .select('note_id, recipient, event_type, created_at')
          .in('note_id', noteIds)
          .order('created_at', { ascending: false });

        if (error || !data || !data.length) return;

        // latest event per note → recipient
        const latest = {};
        for (const ev of data) {
          if (!latest[ev.note_id]) latest[ev.note_id] = {};
          if (!latest[ev.note_id][ev.recipient]) {
            latest[ev.note_id][ev.recipient] = ev.event_type;
          }
        }

        for (const [noteId, recipients] of Object.entries(latest)) {
          const el = document.getElementById(`activity-${noteId}`);
          if (!el) continue;
          el.innerHTML = Object.entries(recipients)
            .map(([email, status]) =>
              `<span class="ev ev-${escHtml(status)}" title="${escHtml(email)}">${escHtml(email)} — ${escHtml(status)}</span>`)
            .join('');
        }
      }

      async function shareNote(btn) {
        const recipient = prompt('Send this note to (email address):');
        if (!recipient) return;

        btn.disabled = true;
        btn.textContent = 'Sending…';

        try {
          const res = await fetch('/api/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              recipient,
              noteId:    btn.dataset.id,
              noteTitle: btn.dataset.title,
              noteContent: btn.dataset.content,
              appUrl: window.location.origin,
            }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || 'Send failed');
          btn.textContent = 'Sent ✓';
          setTimeout(() => { btn.disabled = false; btn.textContent = 'Share via email'; }, 3000);
        } catch (err) {
          showError(err.message);
          btn.disabled = false;
          btn.textContent = 'Share via email';
        }
      }

      document.getElementById('note-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        const status = document.getElementById('status');

        status.textContent = 'Posting…';
        const { error } = await client.from('notes').insert({ title, content });
        if (error) { status.textContent = ''; showError(error.message); return; }

        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        status.textContent = 'Posted!';
        await loadNotes();
      });

      init();
    </script>
  </body>
</html>
